name: StudyHelp CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # Important if using submodules
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: studyhelpBackend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./studyhelpBackend
        run: npm ci

      - name: Lint Backend (Skip if no script)
        working-directory: ./studyhelpBackend
        run: npm run lint || true

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: studyhelpFrontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./studyhelpFrontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./studyhelpFrontend
        run: npm run build
        env:
          # Next.js usually needs env vars at build time for static optimization
          # But we use runtime variables where possible
          NEXT_PUBLIC_API_URL: https://placeholder-url.com
          ALOC_ACCESS_TOKEN: ${{ secrets.ALOC_ACCESS_TOKEN }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
